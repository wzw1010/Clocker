<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Clocker">
    <meta name="theme-color" content="#FF5E3A" id="themeColorMeta">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <title>Clocker</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<!-- 所有 SVG 模板 -->
<template id="icon-clock"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg></template>
<template id="icon-plus"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></template>
<template id="icon-star"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><polygon points="12 2 15 8.5 22 9 17 14 18 21 12 17 6 21 7 14 2 9 9 8.5" stroke-linejoin="round"/></svg></template>
<template id="icon-check"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><polyline points="8 12 11 15 16 9"/></svg></template>
<template id="icon-coin"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="6" x2="12" y2="18"/><line x1="8" y1="9" x2="8" y2="15"/><line x1="16" y1="9" x2="16" y2="15"/></svg></template>
<template id="icon-starCoin"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><polygon points="12 2 15 8.5 22 9 17 14 18 21 12 17 6 21 7 14 2 9 9 8.5"/><line x1="12" y1="6" x2="12" y2="18"/><line x1="8" y1="9" x2="8" y2="15"/><line x1="16" y1="9" x2="16" y2="15"/></svg></template>
<template id="icon-pencil"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></template>
<template id="icon-reset"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></template>
<template id="icon-baseSalary"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><circle cx="12" cy="12" r="2"/><line x1="6" y1="9" x2="6" y2="15"/><line x1="18" y1="9" x2="18" y2="15"/></svg></template>
<template id="icon-performance"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></template>
<template id="icon-otherDeduction"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></template>
<template id="icon-otherAllowance"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></template>
<template id="icon-insurance"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></template>
<template id="icon-personalTax"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="2" y1="8" x2="22" y2="8"/><line x1="12" y1="3" x2="12" y2="17"/></svg></template>
<template id="icon-meal"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg></template>
<template id="icon-nightAllow"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/><circle cx="12" cy="10" r="3"/><line x1="12" y1="3" x2="12" y2="5"/><line x1="12" y1="17" x2="12" y2="19"/></svg></template>
<template id="icon-rent"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></template>
<template id="icon-mealFee"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M5 3v18"/><path d="M5 7h4a4 4 0 0 1 0 8H5"/><circle cx="17" cy="12" r="4"/></svg></template>
<template id="icon-highTemp"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></template>
<template id="icon-seniority"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/><line x1="12" y1="8" x2="12" y2="15"/><line x1="8" y1="11" x2="16" y2="11"/></svg></template>
<template id="icon-arrowLeft"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><line x1="18" y1="6" x2="6" y2="12"/><line x1="6" y1="12" x2="18" y2="18"/></svg></template>
<template id="icon-arrowRight"><svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><line x1="6" y1="6" x2="18" y2="12"/><line x1="18" y1="12" x2="6" y2="18"/></svg></template>

<div class="app">
    <div class="nav-header">
        <div class="header-title-group" id="titleGroup">
            <span class="header-title">Clocker</span>
        </div>
        <div class="nav-actions">
            <button class="more-btn" id="moreBtn" aria-label="More">
                <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="dropdown-menu" id="dropdownMenu">
                <button id="menuPrevMonth"><span id="menuPrevIcon"></span> Prev Month</button>
                <button id="menuNextMonth"><span id="menuNextIcon"></span> Next Month</button>
                <div class="divider"></div>
                <button id="switchThemeBtn">
                    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <span id="themeBtnText">Light Mode</span>
                </button>
                <button id="menuExportBackup">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export Backup
                </button>
                <button id="menuImportBackup">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import Backup
                </button>
                <button id="menuClearData">
                    <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>Clear Month
                </button>
            </div>
        </div>
    </div>
    <div class="scroll-content" id="scrollContent"><div id="cardsWrapper"></div></div>
</div>

<div class="modal-overlay" id="editModalOverlay">
    <div class="modal-content">
        <div class="modal-shift-selector" id="modalShiftSelector">
            <button class="shift-option-big" data-shift="work"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" stroke="currentColor" fill="none"/><line x1="12" y1="1" x2="12" y2="4" stroke="currentColor"/><line x1="4" y1="12" x2="1" y2="12" stroke="currentColor"/><line x1="20" y1="12" x2="23" y2="12" stroke="currentColor"/></svg><span class="shift-text">Day</span></button>
            <button class="shift-option-big" data-shift="night"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" fill="none"/></svg><span class="shift-text">Night</span></button>
            <button class="shift-option-big" data-shift="rest"><svg viewBox="0 0 24 24"><path d="M13 3h-2v6h2V3z" stroke="currentColor" fill="none"/><path d="M4 12h16" stroke="currentColor"/><path d="M6 12v6h12v-6" stroke="currentColor"/></svg><span class="shift-text">Rest</span></button>
            <button class="shift-option-big" data-shift="holiday"><svg viewBox="0 0 24 24"><polygon points="12,2 15,8 22,9 17,14 18,21 12,17 6,21 7,14 2,9 9,8" stroke="currentColor" fill="none"/></svg><span class="shift-text">Holiday</span></button>
        </div>
        <div class="modal-hours-row">
            <input type="number" class="input-field" id="modalNormal" step="any" placeholder="Normal hrs" inputmode="decimal">
            <input type="number" class="input-field" id="modalOvertime" step="any" placeholder="Overtime hrs" inputmode="decimal">
        </div>
        <button class="btn-save" id="modalSaveBtn">Save</button>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>
<input type="file" id="backupFileInput" style="display:none" accept=".json">

<script src="./app.js"></script>
</body>
</html>
